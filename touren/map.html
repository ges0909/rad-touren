// --- Map setup ---
const map = L.map('map').setView([52.4, 13.4], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18
}).addTo(map);

let currentGpxLayer = null;
let poiLayers = { sight: [], art: [], food: [], swim: [] };
let categoryVisible = { sight: true, art: true, food: true, swim: true };

// --- Tour selector ---
const select = document.getElementById('tour-select');
const infoDiv = document.getElementById('tour-info');
const legendDiv = document.getElementById('legend');

TOURS.forEach(t => {
  const opt = document.createElement('option');
  opt.value = t.id;
  opt.textContent = t.name + ' (' + t.distance + ')';
  select.appendChild(opt);
});

select.addEventListener('change', () => {
  const tour = TOURS.find(t => t.id === select.value);
  if (tour) loadTour(tour);
});

// --- Load tour ---
function loadTour(tour) {
  // Clear previous
  if (currentGpxLayer) map.removeLayer(currentGpxLayer);
  Object.values(poiLayers).flat().forEach(m => map.removeLayer(m));
  poiLayers = { sight: [], art: [], food: [], swim: [] };

  // Load GPX
  const gpxUrl = 'gpx/' + tour.id + '.gpx';
  currentGpxLayer = new L.GPX(gpxUrl, {
    async: true,
    polyline_options: { color: '#0066CC', weight: 4, opacity: 0.8 },
    marker_options: {
      startIconUrl: null, endIconUrl: null, shadowUrl: null,
      wptIconUrls: { '': null }
    }
  }).on('loaded', function(e) {
    map.fitBounds(e.target.getBounds().pad(0.1));
  }).addTo(map);

  // Add POI markers
  if (tour.pois) {
    tour.pois.forEach(poi => {
      const group = CATEGORY_MAP[poi.cat] || 'sight';
      const emoji = CATEGORY_EMOJI[group];
      const label = CATEGORY_LABEL[group];

      const icon = L.divIcon({
        html: '<span style="font-size:22px;filter:drop-shadow(1px 1px 1px rgba(0,0,0,0.3))">' + emoji + '</span>',
        className: 'poi-marker',
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      });

      let popupHtml = '<strong>' + emoji + ' ' + (poi.name || 'Unbenannt') + '</strong>';
      popupHtml += '<br><em>' + label + '</em>';
      if (poi.info) popupHtml += '<div class="poi-details">' + poi.info + '</div>';

      const marker = L.marker([poi.lat, poi.lon], { icon: icon })
        .bindPopup(popupHtml);

      if (categoryVisible[group]) marker.addTo(map);
      poiLayers[group].push(marker);
    });
  }

  // Update info
  infoDiv.innerHTML = '<strong>' + tour.distance + '</strong> · ' + tour.region +
    '<br><a href="' + tour.id + '.html">Tourbeschreibung →</a>';
  legendDiv.style.display = 'block';
}

// --- Legend toggle ---
document.querySelectorAll('.legend-item').forEach(item => {
  item.addEventListener('click', () => {
    const cat = item.dataset.category;
    categoryVisible[cat] = !categoryVisible[cat];
    item.classList.toggle('disabled');

    poiLayers[cat].forEach(marker => {
      if (categoryVisible[cat]) marker.addTo(map);
      else map.removeLayer(marker);
    });
  });
});

// --- Load from URL hash ---
const hash = window.location.hash.slice(1);
if (hash) {
  select.value = hash;
  const tour = TOURS.find(t => t.id === hash);
  if (tour) loadTour(tour);
}
